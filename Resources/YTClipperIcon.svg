<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">YTClipper icon</title>
  <desc id="desc">Rounded red download icon with a white down arrow and baseline.</desc>
  <defs>
    <linearGradient id="tile" x1="170" y1="122" x2="856" y2="902" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9d68"/>
      <stop offset="0.32" stop-color="#ff3449"/>
      <stop offset="1" stop-color="#f5002e"/>
    </linearGradient>
    <linearGradient id="rim" x1="177" y1="120" x2="844" y2="917" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3d2" stop-opacity="0.75"/>
      <stop offset="0.42" stop-color="#ff6d79" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#920017" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="mark" x1="348" y1="210" x2="665" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff0ea"/>
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-10%" width="130%" height="135%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#a9001d" flood-opacity="0.32"/>
    </filter>
    <filter id="markShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#8a0018" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="80" y="68" width="864" height="864" rx="142" fill="url(#tile)" filter="url(#softShadow)"/>
  <rect x="93" y="81" width="838" height="838" rx="130" fill="none" stroke="url(#rim)" stroke-width="22"/>
  <path d="M190 141c50-30 121-45 214-45h248c100 0 173 15 219 45" fill="none" stroke="#ffe2bf" stroke-width="15" stroke-linecap="round" opacity="0.5"/>

  <g filter="url(#markShadow)" fill="none" stroke="url(#mark)" stroke-width="62" stroke-linecap="round" stroke-linejoin="round">
    <path d="M512 217v440"/>
    <path d="M346 510l166 166 166-166"/>
    <path d="M330 766h364"/>
  </g>
